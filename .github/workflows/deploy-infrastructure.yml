name: Deploy Azure Infrastructure

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/**'
      - '.github/workflows/deploy-infrastructure.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep infrastructure
        uses: azure/arm-deploy@v2
        id: deploy
        with:
          scope: subscription
          region: eastus
          template: ./infrastructure/main.bicep
          parameters: ./infrastructure/parameters/dev.bicepparam

      - name: Upload website content to static storage
        if: success()
        run: |
          chmod +x ./infrastructure/scripts/deploy-site.sh
          ./infrastructure/scripts/deploy-site.sh "${{ steps.deploy.outputs.outputs.storageAccountName.value }}" "${{ steps.deploy.outputs.outputs.resourceGroupName.value }}" .
